<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS League</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #0b0b1f;
  color: white;
  overflow-x: hidden;
}

header {
  background: linear-gradient(90deg, red, blue);
  padding: 20px;
  text-align: center;
  font-size: 32px;
  font-weight: bold;
  animation: fadeDown 1s ease;
}

nav {
  display: flex;
  justify-content: center;
  background: #111;
}

nav a {
  color: white;
  padding: 15px 20px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  background: red;
  transform: scale(1.1);
}

.hero {
  height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(45deg, red, blue);
  font-size: 50px;
  font-weight: bold;
  animation: fadeIn 2s ease;
}

.container {
  padding: 20px;
}

.banner {
  height: 140px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(90deg, red, blue);
  margin-bottom: 20px;
  border-radius: 12px;
  font-size: 26px;
  font-weight: bold;
  transition: 0.4s;
  animation: fadeUp 1s ease;
}

.banner:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

.card {
  background: #1a1a40;
  margin-bottom: 15px;
  padding: 20px;
  border-radius: 12px;
  font-size: 18px;
  transition: 0.3s;
  animation: fadeUp 1s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 0 15px blue;
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
  margin-top: 20px;
  animation: fadeUp 1.5s ease;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0; transform: scale(0.9);} 
  to {opacity: 1; transform: scale(1);} 
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(30px);} 
  to {opacity: 1; transform: translateY(0);} 
}

@keyframes fadeDown {
  from {opacity: 0; transform: translateY(-30px);} 
  to {opacity: 1; transform: translateY(0);} 
}

</style>
</head>

<body>

<header>CIS LEAGUE</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Teams</a>
  <a href="#">Table</a>
  <a href="#">Rules</a>
</nav>

<div class="hero">CIS COMEBACK</div>

<div class="container">

  <div class="banner">CIS COMEBACK</div>
  <div class="banner">CIS COMEBACK</div>

  <div class="card">🔥 CIS COMEBACK - Big Match Coming Soon</div>
  <div class="card">⚽ CIS COMEBACK - New Season Announced</div>
  <div class="card">🏆 CIS COMEBACK - League Updates</div>

</div>

<footer>
  © 2026 CIS LEAGUE
</footer>

</body>
</html>
