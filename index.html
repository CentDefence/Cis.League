<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIS League</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', Arial;
  background: #050816;
  color: white;
  overflow-x: hidden;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(90deg, red, blue);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

nav a {
  margin-left: 25px;
  text-decoration: none;
  color: #777;
  transition: 0.3s;
}

nav a:hover {
  color: white;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at center, #0a1a40, #050816);
}

.fake-img {
  width: 80%;
  height: 300px;
  border-radius: 20px;
  background: linear-gradient(90deg, red, blue);
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 60px;
  font-weight: bold;
  animation: fadeUp 1s ease;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 60px 40px;
}

.card {
  height: 180px;
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.4s;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 30px;
  backdrop-filter: blur(10px);
}

.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 0 25px rgba(255,0,0,0.4);
}

.section {
  padding: 60px 40px;
}

.line {
  height: 1px;
  background: rgba(255,255,255,0.1);
  margin: 40px 0;
}

footer {
  height: 120px;
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* SCROLL ANIMATION */
.hidden {
  opacity: 0;
  transform: translateY(40px);
  transition: all 0.8s ease;
}

.show {
  opacity: 1;
  transform: translateY(0);
}

@keyframes fadeUp {
  from {opacity: 0; transform: translateY(40px);} 
  to {opacity: 1; transform: translateY(0);} 
}

</style>
</head>

<body>

<header>
  <div class="logo">CIS</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Teams</a>
    <a href="#">Table</a>
    <a href="#">Rules</a>
  </nav>
</header>

<div class="hero">
  <div class="fake-img hidden">CIS</div>
</div>

<div class="grid">
  <div class="card hidden">CIS</div>
  <div class="card hidden">CIS</div>
  <div class="card hidden">CIS</div>
  <div class="card hidden">CIS</div>
</div>

<div class="section">
  <div class="fake-img hidden">CIS</div>
</div>

<div class="line"></div>

<div class="grid">
  <div class="card hidden">CIS</div>
  <div class="card hidden">CIS</div>
  <div class="card hidden">CIS</div>
</div>

<footer></footer>

<script>
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('show');
    }
  });
});

document.querySelectorAll('.hidden').forEach(el => observer.observe(el));
</script>

</body>
</html>
